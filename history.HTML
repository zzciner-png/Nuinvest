<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NuInvest – Tarefas Diárias</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--blue:#1A56DB;--blue-dark:#1240A8;--blue-light:#E8F0FE;--blue-pale:#F0F5FF;--orange:#E07B39;--orange-light:#FFF4EC;--white:#FFFFFF;--bg:#F5F8FF;--text:#0D1F3C;--muted:#6B7FA3;--border:#D6E4FF;--success:#16A34A;--error:#DC2626}
body{font-family:'DM Sans',sans-serif;background:var(--bg);min-height:100vh;padding-bottom:40px;color:var(--text)}
.header{background:var(--white);padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(26,86,219,.06)}
.back-btn{width:36px;height:36px;border-radius:10px;background:var(--blue-light);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center}
.back-btn svg{width:18px;height:18px;stroke:var(--blue);fill:none;stroke-width:2.5}
.header-title{font-family:'Sora',sans-serif;font-size:17px;font-weight:700;flex:1}
.header-badge{background:var(--blue);color:white;font-size:10px;font-weight:700;padding:4px 10px;border-radius:20px;letter-spacing:.4px}
.main{padding:16px 20px}
.day-banner{border-radius:22px;padding:20px 20px 22px;margin-bottom:16px;position:relative;overflow:hidden}
.day-banner.weekday{background:linear-gradient(135deg,var(--blue),var(--blue-dark))}
.day-banner.weekend{background:linear-gradient(135deg,#64748B,#334155)}
.day-banner::before{content:'';position:absolute;top:-40px;right:-40px;width:140px;height:140px;background:rgba(255,255,255,.07);border-radius:50%}
.day-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px;position:relative;z-index:1}
.day-name{font-family:'Sora',sans-serif;font-size:24px;font-weight:800;color:white}
.day-date{font-size:12px;color:rgba(255,255,255,.65);margin-top:3px}
.day-pill{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);border-radius:20px;padding:6px 12px;font-size:11px;font-weight:700;color:white;display:flex;align-items:center;gap:5px}
.live-dot{width:6px;height:6px;background:#7AFFB2;border-radius:50%;animation:blink 1.2s infinite;flex-shrink:0}
.dp-label{display:flex;justify-content:space-between;font-size:11px;color:rgba(255,255,255,.6);margin-bottom:6px;position:relative;z-index:1}
.dp-bar{height:5px;background:rgba(255,255,255,.15);border-radius:4px;overflow:hidden;position:relative;z-index:1}
.dp-fill{height:100%;background:rgba(255,255,255,.8);border-radius:4px;transition:width 1s ease}
.alert-card{border-radius:16px;padding:14px 16px;margin-bottom:12px;display:flex;align-items:flex-start;gap:12px}
.alert-card.info{background:#EFF6FF;border:1.5px solid #BFDBFE}
.alert-card.warn{background:#FFFBEB;border:1.5px solid #FDE68A}
.alert-card.success{background:#F0FDF4;border:1.5px solid #BBF7D0}
.alert-card.danger{background:#FEF2F2;border:1.5px solid #FECACA}
.alert-icon{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.alert-card.info .alert-icon{background:#DBEAFE}.alert-card.warn .alert-icon{background:#FEF3C7}
.alert-card.success .alert-icon{background:#DCFCE7}.alert-card.danger .alert-icon{background:#FEE2E2}
.alert-icon svg{width:17px;height:17px;fill:none;stroke-width:2}
.alert-card.info .alert-icon svg{stroke:#1D4ED8}.alert-card.warn .alert-icon svg{stroke:#D97706}
.alert-card.success .alert-icon svg{stroke:#15803D}.alert-card.danger .alert-icon svg{stroke:#DC2626}
.a-title{font-size:13px;font-weight:700;margin-bottom:2px}
.alert-card.info .a-title{color:#1E40AF}.alert-card.warn .a-title{color:#92400E}
.alert-card.success .a-title{color:#14532D}.alert-card.danger .a-title{color:#991B1B}
.a-msg{font-size:12px;color:var(--muted);line-height:1.5}
.investment-card{background:var(--white);border-radius:16px;border:1.5px solid var(--border);padding:16px;margin-bottom:20px;display:flex;align-items:center;gap:15px}
.investment-icon{width:48px;height:48px;border-radius:12px;background:var(--blue-light);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.investment-icon svg{width:24px;height:24px;stroke:var(--blue);fill:none;stroke-width:2}
.investment-info{flex:1}
.investment-title{font-family:'Sora',sans-serif;font-size:14px;font-weight:700;color:var(--text);margin-bottom:4px}
.investment-detail{font-size:12px;color:var(--muted);margin-bottom:2px}
.investment-value{font-size:13px;font-weight:700;color:var(--blue)}
.earnings-summary{background:var(--white);border-radius:16px;border:1.5px solid var(--border);padding:16px;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center}
.earnings-total{font-family:'Sora',sans-serif;font-size:18px;font-weight:800;color:var(--blue)}
.earnings-label{font-size:12px;color:var(--muted)}
.balance-card{background:var(--white);border-radius:16px;border:1.5px solid var(--border);padding:16px;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center}
.balance-title{font-size:14px;color:var(--muted)}
.balance-value{font-family:'Sora',sans-serif;font-size:24px;font-weight:800;color:var(--success)}
.task-list{display:flex;flex-direction:column;gap:10px;margin-bottom:20px}
.task-card{background:var(--white);border-radius:18px;border:1.5px solid var(--border);overflow:hidden}
.task-card.completed{border-color:#BBF7D0;background:#F0FDF4}
.task-header{padding:14px 16px;display:flex;align-items:center;gap:12px}
.task-brand{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.task-info{flex:1;min-width:0}
.task-name{font-size:13px;font-weight:700;color:var(--text);margin-bottom:2px}
.task-card.completed .task-name{color:var(--success)}
.task-desc{font-size:11px;color:var(--muted);line-height:1.4}
.task-pts{background:var(--blue-light);color:var(--blue);font-size:10px;font-weight:700;padding:4px 9px;border-radius:10px;white-space:nowrap;flex-shrink:0}
.task-card.completed .task-pts{background:#DCFCE7;color:var(--success)}
.task-body{padding:0 16px 14px;border-top:1px solid var(--border)}
.task-instruction{font-size:12px;color:var(--muted);line-height:1.8;padding:10px 0 12px;white-space:pre-line}
.task-check-row{display:flex;flex-direction:column;gap:7px;margin-bottom:12px}
.tc-item{display:flex;align-items:center;gap:10px;padding:9px 12px;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;cursor:pointer;transition:.15s}
.tc-item.checked{background:var(--blue-pale);border-color:var(--blue)}
.tc-item input{width:16px;height:16px;accent-color:var(--blue);flex-shrink:0}
.tc-item span{font-size:12px;color:var(--text)}
.btn-do{width:100%;padding:12px;background:var(--blue);color:white;border:none;border-radius:12px;font-family:'Sora',sans-serif;font-size:13px;font-weight:700;cursor:pointer}
.btn-do:disabled{opacity:.4;cursor:not-allowed}
.btn-done{width:100%;padding:12px;background:var(--success);color:white;border:none;border-radius:12px;font-family:'Sora',sans-serif;font-size:13px;font-weight:700;cursor:default;opacity:.8}
.weekend-card{background:var(--white);border-radius:20px;border:1.5px solid var(--border);padding:28px 20px;text-align:center;margin-bottom:16px}
.weekend-icon{font-size:48px;margin-bottom:14px}
.weekend-title{font-family:'Sora',sans-serif;font-size:18px;font-weight:800;color:var(--text);margin-bottom:8px}
.weekend-msg{font-size:13px;color:var(--muted);line-height:1.7}
.next-task{margin-top:16px;background:var(--blue-pale);border:1.5px solid var(--border);border-radius:14px;padding:14px;display:flex;align-items:center;gap:10px}
.next-task svg{width:18px;height:18px;stroke:var(--blue);fill:none;stroke-width:2;flex-shrink:0}
.next-task span{font-size:13px;color:var(--blue);font-weight:600}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(13,31,60,.5);backdrop-filter:blur(6px);z-index:9000;align-items:center;justify-content:center}
.modal-box{background:white;border-radius:24px;padding:28px 24px;width:90%;max-width:360px;text-align:center;animation:popIn .35s cubic-bezier(.34,1.56,.64,1)}
.modal-icon{width:64px;height:64px;border-radius:50%;margin:0 auto 16px;display:flex;align-items:center;justify-content:center}
.modal-title{font-family:'Sora',sans-serif;font-size:17px;font-weight:800;color:var(--text);margin-bottom:8px}
.modal-msg{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:22px}
.modal-btns{display:flex;gap:10px}
.modal-btns button{flex:1;padding:13px;border-radius:12px;font-family:'Sora',sans-serif;font-size:14px;font-weight:700;cursor:pointer;border:none}
.modal-cancel{background:var(--bg);color:var(--muted);border:1.5px solid var(--border)!important}
.modal-confirm{background:var(--blue);color:white}
.toast{position:fixed;top:24px;left:50%;transform:translateX(-50%) translateY(-80px);background:var(--white);border-radius:14px;padding:14px 20px;display:flex;align-items:center;gap:10px;box-shadow:0 8px 32px rgba(0,0,0,.15);border-left:4px solid var(--success);z-index:9999;font-size:13px;color:var(--text);font-weight:500;min-width:260px;max-width:340px;transition:.4s cubic-bezier(.34,1.56,.64,1)}
.toast.show{transform:translateX(-50%) translateY(0)}.toast.error{border-left-color:var(--error)}.toast.info{border-left-color:var(--blue)}.toast.warn{border-left-color:#F59E0B}
@keyframes popIn{from{transform:scale(.75);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
</style>
</head>

</div>

// Função para buscar dados do usuário
async function fetchUserData(uid) {
  try {
    const userSnap = await getDoc(doc(db, 'users', uid));
    if (userSnap.exists()) {
      userData = userSnap.data();
      console.log('Dados do usuário:', userData);
      
      // Atualizar saldo na interface
      updateBalance();
      
      return userData;
    }
  } catch (error) {
    console.error("Erro ao buscar dados do usuário:", error);
  }
  return null;
}

// Função para buscar investimentos ativos do usuário
async function fetchActiveInvestments(uid) {
  try {
    console.log('Buscando investimentos para uid:', uid);
    
    // Buscar investments do usuário com status active
    const investmentsRef = collection(db, 'investments');
    const q = query(
      investmentsRef, 
      where('uid', '==', uid),
      where('status', '==', 'active')
    );
    
    const querySnapshot = await getDocs(q);
    console.log('Investimentos encontrados:', querySnapshot.size);
    
    if (!querySnapshot.empty) {
      activeInvestments = [];
      dailyEarning = 0;
      totalInvested = 0;
      
      querySnapshot.forEach((doc) => {
        const investmentData = doc.data();
        console.log('Dados do investimento:', investmentData);
        activeInvestments.push(investmentData);
        
        // Somar ganhos diários (daily)
        if (investmentData.daily && investmentData.daily > 0) {
          dailyEarning += investmentData.daily;
        }
        
        // Somar total investido
        if (investmentData.invested && investmentData.invested > 0) {
          totalInvested += investmentData.invested;
        }
      });
      
      console.log('Total ganhos diários:', dailyEarning);
      console.log('Total investido:', totalInvested);
      
      // Atualizar UI com informações dos investimentos
      updateInvestmentsUI();
      updateTasksPoints();
      updateTotalEarnings();
    } else {
      activeInvestments = [];
      dailyEarning = 0;
      totalInvested = 0;
      updateInvestmentsUI();
      totalEarningsEl.textContent = '0 Kz';
    }
    
  } catch (error) {
    console.error("Erro ao buscar investimentos:", error);
    showToast('Erro ao carregar investimentos', 'error');
  }
}

// Atualizar saldo na interface
function updateBalance() {
  if (userData && userData.balance !== undefined) {
    balanceValueEl.textContent = formatCurrency(userData.balance) + ' MT';
  } else {
    balanceValueEl.textContent = '0 Kz';
  }
}

// Atualizar UI com informações dos investimentos
function updateInvestmentsUI() {
  if (activeInvestments.length > 0) {
    const firstInvestment = activeInvestments[0]; // Mostrar o primeiro investimento como exemplo
    
    investmentAreaEl.innerHTML = `
      <div class="investment-card">
        <div class="investment-icon">
          <svg viewBox="0 0 24 24">
            <rect x="2" y="7" width="20" height="14" rx="2" ry="2"/>
            <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>
          </svg>
        </div>
        <div class="investment-info">
          <div class="investment-title">${firstInvestment.planName || 'Plano de Investimento'}</div>
          <div class="investment-detail">Investido: ${formatCurrency(firstInvestment.invested || 0)} Kz</div>
          <div class="investment-detail">Ganho diário: ${formatCurrency(dailyEarning)} MT</div>
          <div class="investment-value">Total ativo: ${activeInvestments.length} investimento(s)</div>
        </div>
      </div>
    `;
  } else {
    investmentAreaEl.innerHTML = `
      <div class="alert-card danger">
        <div class="alert-icon"><svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg></div>
        <div><div class="a-title">Nenhum investimento ativo</div><div class="a-msg">Active um plano de investimento para começar a ganhar com tarefas diárias.</div></div>
      </div>
    `;
  }
}

// Atualizar total de ganhos
function updateTotalEarnings() {
  if (isWeekday && dailyEarning > 0) {
    const completedValue = calculateCompletedEarnings();
    const remaining = dailyEarning - completedValue;
    totalEarningsEl.innerHTML = `${formatCurrency(remaining)} MT <span style="font-size:12px;color:var(--muted);font-weight:normal">(restam)</span>`;
  } else {
    totalEarningsEl.textContent = '0 Kz';
  }
}

// Calcular ganhos já completados
function calculateCompletedEarnings() {
  const tasksToday = TASKS[dow] || [];
  let completed = 0;
  
  tasksToday.forEach(task => {
    if (completedTasksToday.includes(task.id) && task.points) {
      completed += task.points;
    }
  });
  
  return completed;
}

// Formatar moeda
function formatCurrency(value) {
  return value.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");
}

// Atualizar pontos das tarefas com base nos ganhos diários
function updateTasksPoints() {
  const tasksToday = TASKS[dow] || [];
  const tasksCount = tasksToday.length;
  
  if (tasksCount > 0 && dailyEarning > 0) {
    // Distribuir o ganho diário entre as tarefas (valores inteiros)
    const basePoints = Math.floor(dailyEarning / tasksCount);
    const remainder = dailyEarning - (basePoints * tasksCount);
    
    tasksToday.forEach((task, index) => {
      // Adicionar o resto à primeira tarefa
      if (index === 0) {
        task.points = basePoints + remainder;
      } else {
        task.points = basePoints;
      }
    });
  } else {
    // Valores padrão caso não haja investimento
    tasksToday.forEach(task => {
      task.points = 0;
    });
  }
}

// Construir alertas
function buildAlerts() {
  const hasInv = activeInvestments.length > 0;
  const tasks = TASKS[dow] || [];
  const done = completedTasksToday.length;
  
  let html = '';
  
  if (!isWeekday) {
    html += createAlert('info', '<rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>', 'Tarefas indisponíveis ao fim de semana', 'As tarefas estão disponíveis apenas de Segunda a Sexta-feira. Volte na Segunda!');
  } else {
    if (!hasInv) {
      html += createAlert('danger', '<path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>', 'Investimento necessário', 'Para realizar tarefas precisa de um investimento activo. Active um plano primeiro.');
    }
    
    if (done === tasks.length && tasks.length > 0) {
      html += createAlert('success', '<polyline points="20 6 9 17 4 12"/>', 'Todas as tarefas do dia concluídas!', `Parabéns! Completou todas as tarefas de hoje. Ganhou ${formatCurrency(dailyEarning)} Kz!`);
    }
  }
  
  alertAreaEl.innerHTML = html;
}

// Função auxiliar para criar alertas
function createAlert(type, icon, title, msg) {
  return `<div class="alert-card ${type}"><div class="alert-icon"><svg viewBox="0 0 24 24" fill="none" stroke-width="2">${icon}</svg></div><div><div class="a-title">${title}</div><div class="a-msg">${msg}</div></div></div>`;
}

// Construir tarefas
function buildTasksArea() {
  if (!isWeekday) {
    const nextMon = new Date(now);
    nextMon.setDate(now.getDate() + ((8 - dow) % 7 || 7));
    tasksAreaEl.innerHTML = `<div class="weekend-card"><div class="weekend-icon">🌴</div><div class="weekend-title">Fim de semana de descanso!</div><div class="weekend-msg">As tarefas estão disponíveis de<br><b>Segunda a Sexta-feira</b>.<br>Aproveite para relaxar e repor energias.</div><div class="next-task"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg><span>Próximas tarefas na Segunda, ${nextMon.getDate()} de ${MONTHS[nextMon.getMonth()]}</span></div></div>`;
    return;
  }
  
  const tasks = TASKS[dow] || [];
  if (!tasks.length) {
    tasksAreaEl.innerHTML = '';
    return;
  }
  
  // Atualizar pontos antes de construir
  updateTasksPoints();
  
  tasksAreaEl.innerHTML = `<div class="sec-label">Tarefas de Hoje</div><div class="task-list">${tasks.map(buildCard).join('')}</div>`;
}

// Construir card de tarefa
function buildCard(t) {
  const done = completedTasksToday.includes(t.id);
  const hasInv = activeInvestments.length > 0;
  const pointsValue = t.points || 0;
  
  const checks = t.checks.map((ch, i) => 
    `<label class="tc-item ${done ? 'checked' : ''}" onclick="window.toggleTC('${t.id}',${i},this)">
      <input type="checkbox" id="tcck_${t.id}_${i}" ${done ? 'checked disabled' : ''}>
      <span>${ch}</span>
    </label>`
  ).join('');
  
  const body = done ? '' : 
    `<div class="task-body">
      <div class="task-instruction">${t.instruction}</div>
      <div class="task-check-row">${checks}</div>
      <button class="btn-do" id="tbtn_${t.id}" onclick="window.openConfirm('${t.id}')" ${hasInv ? '' : 'disabled'}>
        ${hasInv ? `✓ Receber ${formatCurrency(pointsValue)} Kz` : 'Requer investimento activo'}
      </button>
    </div>`;
  
  return `<div class="task-card ${done ? 'completed' : ''}" id="tcard_${t.id}">
    <div class="task-header">
      <div class="task-brand" style="background:${t.bgColor}">${ICONS[t.brand] || ''}</div>
      <div class="task-info">
        <div class="task-name">${t.name}</div>
        <div class="task-desc">${t.desc}</div>
      </div>
      <div class="task-pts">${done ? '✓ Feito' : `+${formatCurrency(pointsValue)} Kz`}</div>
    </div>${body}
  </div>`;
}

// Atualizar progresso
function updateProgress() {
  const tasks = TASKS[dow] || [];
  if (!tasks.length || !isWeekday) {
    dpPctEl.textContent = 'Fim de semana';
    dpFillEl.style.width = '0%';
    return;
  }
  
  const done = completedTasksToday.length;
  dpPctEl.textContent = `${done}/${tasks.length} tarefas`;
  dpFillEl.style.width = Math.round(done / tasks.length * 100) + '%';
}

// Funções globais para os eventos
window.toggleTC = function(tid, idx, lbl) {
  const cb = document.getElementById(`tcck_${tid}_${idx}`);
  if (cb && !cb.disabled) {
    cb.checked = !cb.checked;
    lbl.classList.toggle('checked', cb.checked);
  }
};

window.openConfirm = function(taskId) {
  const tasks = TASKS[dow] || [];
  const t = tasks.find(x => x.id === taskId);
  if (!t) return;
  
  const allOk = t.checks.every((_, i) => {
    const cb = document.getElementById(`tcck_${taskId}_${i}`);
    return cb && cb.checked;
  });
  
  if (!allOk) {
    showToast('Confirme todos os itens primeiro', 'warn');
    return;
  }
  
  pendingTaskId = taskId;
  document.getElementById('mTitle').textContent = t.name;
  document.getElementById('mMsg').textContent = `Confirma que realizou a tarefa? O bónus de ${formatCurrency(t.points)} Kz será creditado na sua conta.`;
  document.getElementById('confirmModal').style.display = 'flex';
};

window.closeModal = function() {
  document.getElementById('confirmModal').style.display = 'none';
  pendingTaskId = null;
};

window.confirmTask = async function() {
  if (!pendingTaskId || !currentUser) return;
  
  const taskId = pendingTaskId;
  const tasks = TASKS[dow] || [];
  const t = tasks.find(x => x.id === taskId);
  const points = t.points || 0;
  
  try {
    // Fechar modal
    closeModal();
    
    // 1. Registrar o ganho na coleção 'earnings' ou 'ganhos'
    const earningData = {
      uid: currentUser.uid,
      userId: userData?.userId || '',
      userName: userData?.name || '',
      taskId: taskId,
      taskName: t.name,
      taskBrand: t.brand,
      amount: points,
      date: now.toISOString(),
      dateStr: todayStr,
      type: 'task_earning',
      status: 'completed'
    };
    
    // Adicionar à coleção earnings
    await addDoc(collection(db, 'earnings'), earningData);
    console.log('Ganho registrado com sucesso');
    
    // 2. Atualizar o campo totalEarned no documento do usuário
    await updateDoc(doc(db, 'users', currentUser.uid), {
      totalEarned: increment(points),
      balance: increment(points) // Se tiver campo balance
    });
    console.log('totalEarned atualizado');
    
    // 3. Atualizar dados locais do usuário
    if (userData) {
      userData.totalEarned = (userData.totalEarned || 0) + points;
      userData.balance = (userData.balance || 0) + points;
    }
    
    // Marcar tarefa como concluída localmente
    completedTasksToday.push(taskId);
    
    // Salvar no localStorage
    localStorage.setItem(`completedTasks_${currentUser.uid}_${todayStr}`, JSON.stringify(completedTasksToday));
    
    // Atualizar UI
    const card = document.getElementById(`tcard_${taskId}`);
    if (card) {
      card.className = 'task-card completed';
      const taskBody = card.querySelector('.task-body');
      if (taskBody) taskBody.remove();
      
      const pts = card.querySelector('.task-pts');
      if (pts) {
        pts.textContent = '✓ Feito';
        pts.style.background = '#DCFCE7';
        pts.style.color = 'var(--success)';
      }
    }
    
    // Atualizar saldo na interface
    updateBalance();
    updateProgress();
    updateTotalEarnings();
    buildAlerts();
    
    showToast(` Tarefa concluída! Ganhou ${formatCurrency(points)} Kz`, 'success');
    
  } catch (e) {
    console.error('Erro ao confirmar tarefa:', e);
    showToast('Erro ao registar. Tente novamente.', 'error');
  }
};

window.showToast = function(msg, type = 'success') {
  const toast = document.getElementById('toast');
  toast.className = 'toast ' + type;
  document.getElementById('toastMsg').textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 3800);
};

// Carregar tarefas concluídas hoje (localStorage apenas)
function loadCompletedTasks() {
  try {
    const saved = localStorage.getItem(`completedTasks_${currentUser.uid}_${todayStr}`);
    if (saved) {
      completedTasksToday = JSON.parse(saved);
      console.log('Tarefas carregadas:', completedTasksToday);
    } else {
      completedTasksToday = [];
    }
  } catch (e) {
    console.error('Erro ao carregar tarefas concluídas:', e);
    completedTasksToday = [];
  }
}

// Inicialização com autenticação
onAuthStateChanged(auth, async user => {
  if (!user) {
    location.href = 'auth.html';
    return;
  }
  
  currentUser = user;
  
  try {
    // Buscar dados do usuário
    await fetchUserData(user.uid);
    
    // Buscar investimentos ativos
    await fetchActiveInvestments(user.uid);
    
    // Carregar tarefas concluídas hoje (localStorage)
    loadCompletedTasks();
    
    // Construir interface
    buildAlerts();
    buildTasksArea();
    updateProgress();
    updateTotalEarnings();
    updateBalance();
    
  } catch (error) {
    console.error('Erro na inicialização:', error);
    showToast('Erro ao carregar dados', 'error');
  }
});
</script>
