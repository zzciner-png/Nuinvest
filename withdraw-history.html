<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NuInvest – Histórico de Saques</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--blue:#1A56DB;--blue-dark:#1240A8;--blue-light:#E8F0FE;--blue-pale:#F0F5FF;--orange:#E07B39;--orange-light:#FFF4EC;--white:#FFFFFF;--bg:#F5F8FF;--text:#0D1F3C;--muted:#6B7FA3;--border:#D6E4FF;--success:#16A34A;--error:#DC2626;--warn:#F59E0B;--pass:#7C3AED}
body{font-family:'DM Sans',sans-serif;background:var(--bg);min-height:100vh;padding-bottom:40px;color:var(--text)}
.header{background:var(--white);padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(26,86,219,.06)}
.back-btn{width:36px;height:36px;border-radius:10px;background:var(--blue-light);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center}
.back-btn svg{width:18px;height:18px;stroke:var(--blue);fill:none;stroke-width:2.5}
.header-title{font-family:'Sora',sans-serif;font-size:17px;font-weight:700}
.main{padding:20px}

/* Stats */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.stat-c{background:var(--white);border-radius:16px;border:1.5px solid var(--border);padding:16px;text-align:center}
.stat-c .lbl{font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:4px}
.stat-c .val{font-family:'Sora',sans-serif;font-size:18px;font-weight:800}
.val.orange{color:var(--orange)}.val.green{color:var(--success)}.val.blue{color:var(--blue)}.val.warn{color:var(--warn)}.val.pass{color:var(--pass)}

/* Summary banner */
.summary-card{background:linear-gradient(135deg,var(--orange),#C4612A);border-radius:20px;padding:20px;margin-bottom:20px;position:relative;overflow:hidden}
.summary-card::after{content:'';position:absolute;top:-30px;right:-30px;width:120px;height:120px;background:rgba(255,255,255,.08);border-radius:50%}
.summary-card .row{display:flex;justify-content:space-between;align-items:center;position:relative;z-index:1}
.summary-card .lbl{font-size:11px;color:rgba(255,255,255,.7);margin-bottom:4px}
.summary-card .val{font-family:'Sora',sans-serif;font-size:22px;font-weight:800;color:white}
.summary-card .divider{width:1px;height:40px;background:rgba(255,255,255,.2)}

/* Filter */
.filter-bar{display:flex;gap:8px;margin-bottom:20px;overflow-x:auto;padding-bottom:4px}
.filter-btn{flex-shrink:0;padding:8px 16px;border-radius:20px;font-size:12px;font-weight:700;border:1.5px solid var(--border);background:var(--white);color:var(--muted);cursor:pointer;transition:.15s;display:flex;align-items:center;gap:6px}
.filter-btn.active{background:var(--blue);color:white;border-color:var(--blue)}
.filter-btn .dot{width:7px;height:7px;border-radius:50%}

/* List */
.list-card{background:var(--white);border-radius:20px;border:1.5px solid var(--border);overflow:hidden}
.list-item{display:flex;align-items:center;gap:14px;padding:16px;border-bottom:1px solid var(--border);transition:.15s}
.list-item:last-child{border-bottom:none}
.list-item:hover{background:var(--bg)}
.item-icon{width:44px;height:44px;border-radius:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.item-icon.pending{background:#FEF3C7}
.item-icon.pass{background:#F3E8FF}
.item-icon.approved{background:#DCFCE7}
.item-icon.rejected{background:#FEE2E2}
.item-icon svg{width:20px;height:20px;fill:none;stroke-width:2}
.item-icon.pending svg{stroke:var(--warn)}
.item-icon.pass svg{stroke:var(--pass)}
.item-icon.approved svg{stroke:var(--success)}
.item-icon.rejected svg{stroke:var(--error)}
.item-info{flex:1}
.item-name{font-size:14px;font-weight:700;color:var(--text)}
.item-bank{font-size:11px;color:var(--muted);margin-top:2px}
.item-date{font-size:11px;color:var(--muted);margin-top:1px}
.item-right{text-align:right}
.item-amount{font-family:'Sora',sans-serif;font-size:15px;font-weight:800}
.item-amount.approved{color:var(--success)}.item-amount.pending{color:var(--warn)}.item-amount.rejected{color:var(--error)}.item-amount.pass{color:var(--pass)}
.item-net{font-size:11px;color:var(--muted);margin-top:2px}
.item-status{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:10px;font-size:10px;font-weight:700;margin-top:4px}
.item-status.pending{background:#FEF3C7;color:var(--warn)}
.item-status.pass{background:#F3E8FF;color:var(--pass)}
.item-status.approved{background:#DCFCE7;color:var(--success)}
.item-status.rejected{background:#FEE2E2;color:var(--error)}

.empty-state{text-align:center;padding:48px 20px}
.empty-state svg{width:56px;height:56px;stroke:var(--muted);fill:none;stroke-width:1.5;margin-bottom:14px}
.empty-state h3{font-family:'Sora',sans-serif;font-size:16px;font-weight:700;margin-bottom:6px}
.empty-state p{font-size:13px;color:var(--muted)}
.btn-primary{display:block;width:calc(100% - 40px);margin:16px 20px 0;padding:14px;background:var(--blue);color:white;border:none;border-radius:12px;font-family:'Sora',sans-serif;font-size:15px;font-weight:700;cursor:pointer;text-align:center;text-decoration:none;box-shadow:0 6px 20px rgba(26,86,219,.30);transition:.2s}
.btn-primary:hover{background:var(--blue-dark)}

/* Status timeline */
.status-timeline{display:flex;align-items:center;gap:6px;margin:12px 0 4px}
.tl-step{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1}
.tl-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;border:2px solid var(--border)}
.tl-dot.done{background:var(--success);border-color:var(--success);color:white}
.tl-dot.current{background:var(--warn);border-color:var(--warn);color:white}
.tl-dot.current.pass{background:var(--pass);border-color:var(--pass);color:white}
.tl-dot.current.approved{background:var(--success);border-color:var(--success);color:white}
.tl-dot.inactive{background:var(--bg);border-color:var(--border);color:var(--muted)}
.tl-label{font-size:10px;font-weight:600;color:var(--muted);text-align:center}
.tl-label.active{color:var(--text)}
.tl-line{height:2px;flex:1;background:var(--border);margin-bottom:16px}
.tl-line.done{background:var(--success)}

/* Detail modal */
.modal-overlay{position:fixed;inset:0;background:rgba(13,31,60,.5);backdrop-filter:blur(4px);z-index:500;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:.3s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--white);border-radius:24px 24px 0 0;padding:28px 24px 44px;width:100%;max-width:480px;transform:translateY(100%);transition:.35s cubic-bezier(.34,1.56,.64,1)}
.modal-overlay.open .modal{transform:translateY(0)}
.modal-drag{width:36px;height:4px;background:var(--border);border-radius:4px;margin:0 auto 20px}
.modal-title{font-family:'Sora',sans-serif;font-size:18px;font-weight:800;margin-bottom:4px;text-align:center}
.detail-rows{background:var(--bg);border-radius:16px;padding:16px;margin:16px 0}
.detail-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:14px}
.detail-row:last-child{border-bottom:none}
.detail-row .k{color:var(--muted)}.detail-row .v{font-weight:600}
.btn-close{width:100%;padding:13px;background:var(--blue-light);color:var(--blue);border:none;border-radius:12px;font-family:'Sora',sans-serif;font-size:14px;font-weight:700;cursor:pointer;margin-top:4px}
</style>
</head>
<body>
<div class="header">
  <button class="back-btn" onclick="history.back()"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></button>
  <div class="header-title">Histórico de Saques</div>
</div>
<div class="main">
  <div class="summary-card">
    <div class="row">
      <div><div class="lbl">Total Levantado</div><div class="val" id="totalW">0 MT</div></div>
      <div class="divider"></div>
      <div style="text-align:right"><div class="lbl">Nº de Pedidos</div><div class="val" id="totalCount">0</div></div>
    </div>
  </div>

  <div class="stats-grid">
    <div class="stat-c"><div class="lbl">Aprovados</div><div class="val green" id="cApproved">0</div></div>
    <div class="stat-c"><div class="lbl">Pendentes</div><div class="val warn" id="cPending">0</div></div>
    <div class="stat-c"><div class="lbl">A Passar</div><div class="val pass" id="cPass">0</div></div>
    <div class="stat-c"><div class="lbl">Rejeitados</div><div class="val orange" id="cRejected">0</div></div>
  </div>

  <div class="filter-bar">
    <button class="filter-btn active" onclick="filterW('all',this)">Todos</button>
    <button class="filter-btn" onclick="filterW('pending',this)"><div class="dot" style="background:var(--warn)"></div>Pendentes</button>
    <button class="filter-btn" onclick="filterW('pass',this)"><div class="dot" style="background:var(--pass)"></div>A Passar</button>
    <button class="filter-btn" onclick="filterW('approved',this)"><div class="dot" style="background:var(--success)"></div>Aprovados</button>
    <button class="filter-btn" onclick="filterW('rejected',this)"><div class="dot" style="background:var(--error)"></div>Rejeitados</button>
  </div>

  <div class="list-card" id="wList">
    <div class="empty-state">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      <h3>Carregando...</h3>
    </div>
  </div>
</div>

<a href="withdraw.html" class="btn-primary">+ Novo Levantamento</a>

<!-- Detail Modal -->
<div class="modal-overlay" id="detailModal">
  <div class="modal">
    <div class="modal-drag"></div>
    <div class="modal-title">Detalhe do Saque</div>
    <div id="statusTimeline"></div>
    <div class="detail-rows" id="detailRows"></div>
    <button class="btn-close" onclick="document.getElementById('detailModal').classList.remove('open')">Fechar</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, query, where, getDocs, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// 👉 Configuração do novo banco de dados (nuinvest2-b01f6)
const firebaseConfig = {
  apiKey: "AIzaSyBJIlD1EdStGXn2_T6J-BwfB9JzveqcDfk",
  authDomain: "nuinvest2-b01f6.firebaseapp.com",
  projectId: "nuinvest2-b01f6",
  storageBucket: "nuinvest2-b01f6.firebasestorage.app",
  messagingSenderId: "150015584232",
  appId: "1:150015584232:web:4e33b875d849faaf6fe65d"
};

// Inicializa o app com o novo banco
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// ✅ Formatar moeda (SEM CONVERSÃO)
function formatMoney(valor) {
  return Number(valor).toFixed(2).replace(/\./g, ',').replace(/\B(?=(\d{3})+(?!\d))/g, ".");
}

let allW = [];



function getBankName(bankField) {
  if (!bankField) return '—';
  if (typeof bankField === 'object' && bankField.bank) return bankField.bank;
  if (typeof bankField === 'string') return bankField;
  return '—';
}

function getIban(bankField) {
  if (!bankField) return '—';
  if (typeof bankField === 'object' && bankField.iban) return bankField.iban;
  if (typeof bankField === 'string') return bankField;
  return '—';
}

function getAccountName(bankField) {
  if (!bankField) return '—';
  if (typeof bankField === 'object' && bankField.name) return bankField.name;
  if (typeof bankField === 'string') return bankField;
  return '—';
}

// Status: pending → pass → approved (ou rejected)
const statusIcons = {
  pending: '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>',
  pass: '<svg viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>',
  approved: '<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>',
  rejected: '<svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>'
};

const statusLabels = {
  pending: 'Pendente',
  pass: 'A Passar',
  approved: 'Concluído',
  rejected: 'Rejeitado'
};

// Timeline visual de fases
function buildTimeline(status) {
  const phases = ['pending', 'pass', 'approved'];
  const currentIdx = phases.indexOf(status);
  const isRejected = status === 'rejected';

  if (isRejected) {
    return `<div style="text-align:center;margin:12px 0">
      <span class="item-status rejected" style="font-size:12px;padding:6px 16px">✗ Pedido Rejeitado</span>
    </div>`;
  }

  let html = '<div class="status-timeline">';
  phases.forEach((phase, idx) => {
    const isDone = idx < currentIdx;
    const isCurrent = idx === currentIdx;
    const isInactive = idx > currentIdx;
    const dotClass = isDone ? 'done' : isCurrent ? `current ${phase}` : 'inactive';
    const labelClass = (isDone || isCurrent) ? 'active' : '';
    const icon = isDone ? '✓' : isCurrent ? (idx + 1) : (idx + 1);
    html += `<div class="tl-step">
      <div class="tl-dot ${dotClass}">${icon}</div>
      <div class="tl-label ${labelClass}">${statusLabels[phase]}</div>
    </div>`;
    if (idx < phases.length - 1) {
      html += `<div class="tl-line ${isDone ? 'done' : ''}"></div>`;
    }
  });
  html += '</div>';
  return html;
}

function renderList(list) {
  const el = document.getElementById('wList');

  if (!list || list.length === 0) {
    el.innerHTML = `<div class="empty-state">
      <svg viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      <h3>Sem registos</h3>
      <p>Nenhum saque encontrado para este filtro.</p>
    </div>`;
    return;
  }

  el.innerHTML = list.map((w, idx) => {
    const status = w.status || 'pending';
    let dateStr = 'Data inválida';
    if (w.date) {
      try {
        const dt = new Date(w.date);
        dateStr = dt.toLocaleDateString('pt-AO', { day: '2-digit', month: 'short', year: 'numeric' });
      } catch (e) { dateStr = String(w.date); }
    }
    const bankName = getBankName(w.bank);
    const iban = getIban(w.bank);
    const accountName = getAccountName(w.bank);
    const grossValue = w.gross || w.amount || 0;
    const netValue = w.net || 0;

    return `<div class="list-item" onclick="showDetail(${idx})">
      <div class="item-icon ${status}">${statusIcons[status] || statusIcons.pending}</div>
      <div class="item-info">
        <div class="item-name">${accountName.substring(0, 20)}${accountName.length > 20 ? '...' : ''}</div>
        <div class="item-bank">${bankName} · ****${iban.slice(-4)}</div>
        <div class="item-date">${dateStr}</div>
      </div>
      <div class="item-right">
        <div class="item-amount ${status}">${formatMoney(grossValue)} MT</div>
        <div class="item-net">Líquido: ${formatMoney(netValue)} MT</div>
        <div class="item-status ${status}">${statusLabels[status]}</div>
      </div>
    </div>`;
  }).join('');
}

window.filterW = function(filter, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (filter === 'all') renderList(allW);
  else renderList(allW.filter(w => (w.status || 'pending') === filter));
};

window.showDetail = function(idx) {
  const w = allW[idx];
  if (!w) return;
  const status = w.status || 'pending';
  const bankName = getBankName(w.bank);
  const iban = getIban(w.bank);
  const accountName = getAccountName(w.bank);
  let dateStr = 'Data inválida';
  if (w.date) {
    try { dateStr = new Date(w.date).toLocaleString('pt-AO'); }
    catch (e) { dateStr = String(w.date); }
  }
  
  const grossKz = w.gross || w.amount || 0;
  const feeKz = w.fee || 0;
  const netKz = w.net || 0;
  
  document.getElementById('statusTimeline').innerHTML = buildTimeline(status);
  document.getElementById('detailRows').innerHTML = `
    <div class="detail-row"><span class="k">Valor Bruto</span><span class="v">${formatMoney(grossKz)} MT</span></div>
    <div class="detail-row"><span class="k">Taxa (15%)</span><span class="v" style="color:var(--error)">-${formatMoney(feeKz)} MT</span></div>
    <div class="detail-row"><span class="k">Valor Líquido</span><span class="v" style="color:var(--success)">${formatMoney(netKz)} MT</span></div>
    <div class="detail-row"><span class="k">Banco</span><span class="v">${bankName}</span></div>
    <div class="detail-row"><span class="k">IBAN</span><span class="v" style="font-family:monospace">${iban}</span></div>
    <div class="detail-row"><span class="k">Titular</span><span class="v">${accountName}</span></div>
    <div class="detail-row"><span class="k">Data</span><span class="v">${dateStr}</span></div>
    <div class="detail-row"><span class="k">Estado</span><span class="v"><span class="item-status ${status}" style="display:inline-flex">${statusLabels[status]}</span></span></div>
  `;
  document.getElementById('detailModal').classList.add('open');
};

onAuthStateChanged(auth, async user => {
  if (!user) { location.href = 'auth.html'; return; }
  try {
    const withdrawalsRef = collection(db, 'withdrawals');
    let snapshot;
    try {
      const q = query(withdrawalsRef, where('uid', '==', user.uid), orderBy('date', 'desc'));
      snapshot = await getDocs(q);
    } catch (e) {
      const q = query(withdrawalsRef, where('uid', '==', user.uid));
      snapshot = await getDocs(q);
    }
    allW = [];
    snapshot.forEach(d => allW.push({ ...d.data(), docId: d.id }));
    allW.sort((a, b) => {
      if (!a.date) return 1; if (!b.date) return -1;
      return new Date(b.date) - new Date(a.date);
    });

    let totalW = 0, approved = 0, pending = 0, pass = 0, rejected = 0;
    allW.forEach(w => {
      const s = w.status || 'pending';
      totalW += w.net || 0;
      if (s === 'approved') approved++;
      if (s === 'pending')  pending++;
      if (s === 'pass')     pass++;
      if (s === 'rejected') rejected++;
    });

    document.getElementById('totalW').textContent = formatMoney(totalW) + ' MT';
    document.getElementById('totalCount').textContent = allW.length;
    document.getElementById('cApproved').textContent = approved;
    document.getElementById('cPending').textContent  = pending;
    document.getElementById('cPass').textContent     = pass;
    document.getElementById('cRejected').textContent = rejected;
    renderList(allW);
  } catch (error) {
    document.getElementById('wList').innerHTML = `
      <div class="empty-state">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/></svg>
        <h3>Erro ao carregar</h3>
        <p>${error.message}</p>
      </div>`;
  }
});
</script>
</body>
</html>
